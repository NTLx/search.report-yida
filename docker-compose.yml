services:
  search.report-yida:
    image: registry.cn-shanghai.aliyuncs.com/dev_env_tools/search.report-yida
    # build:  # 可选配置项：当预构建镜像不可用时，自动从本地Dockerfile构建
    #   context: .
    #   dockerfile: Dockerfile
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      # 环境变量配置，可通过环境变量覆盖或在.env文件中配置
      - USERID=${USERID}
      - CLIENT_ID=${CLIENT_ID}
      - CLIENT_SECRET=${CLIENT_SECRET}
      - APP_TYPE=${APP_TYPE}
      - SYSTEM_TOKEN=${SYSTEM_TOKEN}
      - FORM_UUID=${FORM_UUID}
      - TIMEOUT=${TIMEOUT:-86400000}
      - NAME_FIELD_ID=${NAME_FIELD_ID}
      - PHONE_FIELD_ID=${PHONE_FIELD_ID}
      - ATTACHMENT_FIELD_ID=${ATTACHMENT_FIELD_ID}
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-3001}
    # volumes:  # 可选配置项：用于挂载本地文件或目录到容器内
    #   # 示例：挂载.env文件到容器内
    #   # - ./.env:/app/.env
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"